<!DOCTYPE html>
<html>
<head>
    <title>Trading Money Management</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            padding: 20px;
        }

        .panel {
            background: #1c1c1c;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        input, select, button {
            padding: 5px;
            margin: 5px;
        }

        .green { color: lime; }
        .red { color: red; }

        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Trading Money Manager</h2>

<div class="panel">
    Initial Capital: <input type="number" id="capital" value="20"><br>
    Base Amount: <input type="number" id="baseAmount" value="1"><br>
    Payout %: <input type="number" id="payout" value="90"><br>
    Target Profit: <input type="number" id="target" value="1"><br>
</div>

<div class="panel">
    Current Amount: <span id="currentAmount">1</span><br>
    Total Trades: <span id="totalTrades">0</span><br>
    Wins: <span id="wins">0</span><br>
    Losses: <span id="losses">0</span><br>
    Profit: <span id="profit">0</span><br>
</div>

<div class="panel">
    <button onclick="winTrade()">WIN</button>
    <button onclick="loseTrade()">LOSS</button>
    <button onclick="newSession()">NEW SESSION</button>
</div>

<script>

let totalTrades = 0;
let wins = 0;
let losses = 0;
let profit = 0;
let currentAmount = 1;

function updateDisplay() {
    document.getElementById("currentAmount").innerText = currentAmount.toFixed(2);
    document.getElementById("totalTrades").innerText = totalTrades;
    document.getElementById("wins").innerText = wins;
    document.getElementById("losses").innerText = losses;
    document.getElementById("profit").innerText = profit.toFixed(2);
}

function winTrade() {
    let payout = document.getElementById("payout").value / 100;

    totalTrades++;
    wins++;

    profit += currentAmount * payout;

    currentAmount = parseFloat(document.getElementById("baseAmount").value);

    updateDisplay();
}

function loseTrade() {
    let payout = document.getElementById("payout").value / 100;
    let target = parseFloat(document.getElementById("target").value);

    totalTrades++;
    losses++;

    profit -= currentAmount;

    currentAmount = (currentAmount + target) / payout;

    updateDisplay();
}

function newSession() {
    totalTrades = 0;
    wins = 0;
    losses = 0;
    profit = 0;
    currentAmount = parseFloat(document.getElementById("baseAmount").value);

    updateDisplay();
}

updateDisplay();

</script>

</body>
</html>
