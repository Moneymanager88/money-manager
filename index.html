<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c0c0c"/>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>Money Manager Pro</title>
</head>
<body>

<div class="container">

    <!-- TRADE TABLE -->
    <div class="trade-table" id="tradeTable"></div>

    <!-- PANELS -->
    <div class="panels">

        <!-- CALCULATIONS -->
        <div class="card">
            <h3>Calculations</h3>
            <label>Initial Capital</label>
            <input id="initialCapital" type="number" value="20">

            <label>Total Trades</label>
            <input id="totalTrades" type="number" value="12">

            <label>Win Trades</label>
            <input id="winTrades" type="number" value="4">

            <label>Payout %</label>
            <input id="payout" type="number" value="90">

            <p>W/R: <span id="winRate" class="green">0%</span></p>

            <button class="red-btn" onclick="resetAll()">RESET</button>
        </div>

        <!-- SESSION COUNTER -->
        <div class="card">
            <h3>Session Counter</h3>
            <div class="session-number" id="sessionCounter">0</div>

            <button class="green-btn" onclick="newSession()">NEW SESSION</button>
            <button class="red-btn" onclick="clearSessions()">CLEAR ALL SESSIONS</button>
        </div>

        <!-- DAILY GOALS -->
        <div class="card">
            <h3>Daily Goals</h3>

            <label>Profit Target</label>
            <input id="profitTarget" type="number" value="20">

            <p>Sessions Required: <span id="sessionsRequired">0</span></p>
            <p>Account Growth: <span id="accountGrowth" class="green">0%</span></p>
        </div>

        <!-- STOP LOSS -->
        <div class="card">
            <h3>Red Alerts</h3>

            <label>High Stop Loss %</label>
            <input id="stopLossPercent" type="number" value="20">

            <p>Stop Loss: <span id="stopLossAmount" class="red">$0</span></p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
