<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h1>Money Manager Pro</h1>

    <div class="panel">

        <div class="inputs">
            <label>Initial Capital</label>
            <input type="number" id="initialCapital" value="20">

            <label>Base Trade Amount</label>
            <input type="number" id="baseTrade" value="2">

            <label>Payout %</label>
            <input type="number" id="payout" value="90">

            <label>Profit Target ($)</label>
            <input type="number" id="profitTarget" value="5">

            <label>Stop Loss %</label>
            <input type="number" id="stopLossPercent" value="20">

            <h3>Martingale Settings</h3>

            <label>Enable Martingale</label>
            <input type="checkbox" id="martingaleToggle">

            <label>Multiplier</label>
            <input type="number" id="martingaleMultiplier" value="2">

            <label>Max Steps</label>
            <input type="number" id="maxSteps" value="5">

            <button onclick="startSession()">START SESSION</button>
        </div>

        <div class="stats">
            <h2>Session</h2>
            <p>Capital: $<span id="capital">0</span></p>
            <p>Current Trade: $<span id="currentTrade">0</span></p>
            <p>Profit: $<span id="profit">0</span></p>
            <p>Wins: <span id="wins">0</span></p>
            <p>Losses: <span id="losses">0</span></p>
            <p>Win Rate: <span id="winRate">0%</span></p>

            <div class="buttons">
                <button class="win" onclick="addWin()">WIN</button>
                <button class="loss" onclick="addLoss()">LOSS</button>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
                           </html>
